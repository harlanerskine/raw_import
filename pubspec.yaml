name: raw_import
description: >
  RAW image import plugin for Flutter. Decodes DNG, CR3, NEF, ARW, RAF, and
  other camera RAW formats to RGB pixels via pure-Rust rawler library with
  flutter_rust_bridge FFI.
version: 0.1.0

environment:
  sdk: ^3.7.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  ffi: ^2.1.3
  ffigen: ^13.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
        package: com.township.raw_import
        pluginClass: RawImportPlugin
      ios:
        ffiPlugin: true
        pluginClass: RawImportPlugin
